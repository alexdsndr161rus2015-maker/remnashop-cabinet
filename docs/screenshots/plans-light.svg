<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="accl2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f6bf0"/><stop offset="1" stop-color="#0aa5c2"/>
    </linearGradient>
  </defs>
  <rect width="920" height="560" rx="14" fill="#f6f4ee"/>

  <text x="40" y="58" fill="#1c1b17" font-size="24" font-weight="700">Тарифы</text>
  <text x="40" y="82" fill="#6c685e" font-size="13">Выберите подходящий план — оплата картой, СБП или криптовалютой</text>

  <!-- Plan 1 -->
  <rect x="40" y="110" width="266" height="380" rx="18" fill="#fffdfa" stroke="#e6e1d5"/>
  <text x="64" y="150" fill="#1c1b17" font-size="16" font-weight="700">1 месяц</text>
  <text x="64" y="196" fill="#1c1b17" font-size="30" font-weight="800">149 <tspan font-size="16" fill="#9a958a">₽</tspan></text>
  <text x="64" y="240" fill="#6c685e" font-size="12">✓ Безлимитный трафик</text>
  <text x="64" y="268" fill="#6c685e" font-size="12">✓ До 5 устройств</text>
  <text x="64" y="296" fill="#6c685e" font-size="12">✓ Все локации</text>
  <rect x="64" y="430" width="218" height="38" rx="11" fill="#eeeadf"/>
  <text x="173" y="454" fill="#6c685e" font-size="13" font-weight="600" text-anchor="middle">Выбрать</text>

  <!-- Plan 2 (highlighted) -->
  <rect x="327" y="98" width="266" height="404" rx="18" fill="#ffffff" stroke="#2f6bf0" stroke-width="1.5"/>
  <rect x="453" y="86" width="86" height="22" rx="11" fill="url(#accl2)"/>
  <text x="496" y="101" fill="#ffffff" font-size="11" font-weight="700" text-anchor="middle">ВЫГОДНО</text>
  <text x="351" y="150" fill="#1c1b17" font-size="16" font-weight="700">3 месяца</text>
  <text x="351" y="196" fill="#1c1b17" font-size="30" font-weight="800">399 <tspan font-size="16" fill="#9a958a">₽</tspan></text>
  <text x="351" y="218" fill="#9a958a" font-size="11">133 ₽ / месяц</text>
  <text x="351" y="252" fill="#3a362e" font-size="12">✓ Безлимитный трафик</text>
  <text x="351" y="280" fill="#3a362e" font-size="12">✓ До 10 устройств</text>
  <text x="351" y="308" fill="#3a362e" font-size="12">✓ Приоритетная поддержка</text>
  <rect x="351" y="442" width="218" height="40" rx="11" fill="url(#accl2)"/>
  <text x="460" y="467" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">Выбрать</text>

  <!-- Plan 3 -->
  <rect x="614" y="110" width="266" height="380" rx="18" fill="#fffdfa" stroke="#e6e1d5"/>
  <text x="638" y="150" fill="#1c1b17" font-size="16" font-weight="700">1 год</text>
  <text x="638" y="196" fill="#1c1b17" font-size="30" font-weight="800">1290 <tspan font-size="16" fill="#9a958a">₽</tspan></text>
  <text x="638" y="218" fill="#9a958a" font-size="11">107 ₽ / месяц</text>
  <text x="638" y="252" fill="#6c685e" font-size="12">✓ Безлимитный трафик</text>
  <text x="638" y="280" fill="#6c685e" font-size="12">✓ До 10 устройств</text>
  <text x="638" y="308" fill="#6c685e" font-size="12">✓ Максимальная выгода</text>
  <rect x="638" y="430" width="218" height="38" rx="11" fill="#eeeadf"/>
  <text x="747" y="454" fill="#6c685e" font-size="13" font-weight="600" text-anchor="middle">Выбрать</text>
