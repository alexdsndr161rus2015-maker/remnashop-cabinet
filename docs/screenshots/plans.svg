    <g stroke="#2bd4ee" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M351 316 l3 3 l6 -7"/><path d="M351 344 l3 3 l6 -7"/><path d="M351 372 l3 3 l6 -7"/><path d="M351 400 l3 3 l6 -7"/>
    </g>
    <rect x="351" y="504" width="218" height="44" rx="12" fill="url(#mp)"/>
    <text x="460" y="531" fill="#06121f" font-size="13" font-weight="700" text-anchor="middle">Выбрать</text>
  </g>

  <!-- Card UNLIMITED -->
  <g>
    <rect x="610" y="156" width="270" height="404" rx="22" fill="#111722" stroke="#1f2a3d"/>
    <text x="636" y="196" fill="#eef3fb" font-size="17" font-weight="700">UNLIMITED</text>
    <text x="636" y="216" fill="#65728a" font-size="11">максимум возможностей</text>
    <text x="636" y="262" fill="#eef3fb" font-size="32" font-weight="800">799 <tspan font-size="17" fill="#9aa7bd">₽</tspan></text>
    <text x="636" y="284" fill="#65728a" font-size="11">за 30 дн.</text>
    <g fill="#9aa7bd" font-size="12">
      <text x="654" y="324">Безлимитный трафик</text>
      <text x="654" y="352">До 10 устройств</text>
      <text x="654" y="380">Все локации</text>
      <text x="654" y="408">Любая платформа</text>
    </g>
    <g stroke="#4d8bff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M636 320 l3 3 l6 -7"/><path d="M636 348 l3 3 l6 -7"/><path d="M636 376 l3 3 l6 -7"/><path d="M636 404 l3 3 l6 -7"/>
    </g>
    <rect x="636" y="494" width="218" height="42" rx="12" fill="#13233f" stroke="#4d8bff" stroke-opacity="0.4"/>
    <text x="745" y="520" fill="#4d8bff" font-size="13" font-weight="600" text-anchor="middle">Выбрать</text>
