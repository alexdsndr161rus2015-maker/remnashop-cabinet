<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 600" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="mp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4d8bff"/><stop offset="1" stop-color="#2bd4ee"/>
    </linearGradient>
  </defs>
  <rect width="920" height="600" rx="14" fill="#0a0d15"/>

  <text x="40" y="50" fill="#eef3fb" font-size="26" font-weight="800">Тарифы</text>
  <text x="40" y="74" fill="#9aa7bd" font-size="13">Выберите срок и тариф — оплата картой, СБП или криптовалютой</text>

  <!-- term pills -->
  <rect x="40" y="92" width="78" height="34" rx="11" fill="#13233f" stroke="#4d8bff" stroke-width="1.3"/>
  <text x="79" y="114" fill="#4d8bff" font-size="12" font-weight="600" text-anchor="middle">30 дн.</text>
  <rect x="126" y="92" width="78" height="34" rx="11" fill="#111722" stroke="#1f2a3d"/>
  <text x="165" y="114" fill="#9aa7bd" font-size="12" text-anchor="middle">90 дн.</text>
  <rect x="212" y="92" width="84" height="34" rx="11" fill="#111722" stroke="#1f2a3d"/>
  <text x="254" y="114" fill="#9aa7bd" font-size="12" text-anchor="middle">180 дн.</text>
  <rect x="304" y="92" width="84" height="34" rx="11" fill="#111722" stroke="#1f2a3d"/>
  <text x="346" y="114" fill="#9aa7bd" font-size="12" text-anchor="middle">365 дн.</text>

  <!-- Card SOLO -->
  <g>
    <rect x="40" y="156" width="270" height="404" rx="22" fill="#111722" stroke="#1f2a3d"/>
    <text x="66" y="196" fill="#eef3fb" font-size="17" font-weight="700">SOLO · 1</text>
    <text x="66" y="216" fill="#65728a" font-size="11">1 устройство</text>
    <text x="66" y="262" fill="#eef3fb" font-size="32" font-weight="800">129 <tspan font-size="17" fill="#9aa7bd">₽</tspan></text>
    <text x="66" y="284" fill="#65728a" font-size="11">за 30 дн.</text>
    <g fill="#9aa7bd" font-size="12">
      <text x="84" y="324">Безлимитный трафик</text>
      <text x="84" y="352">До 1 устройства</text>
      <text x="84" y="380">Все локации</text>
      <text x="84" y="408">Любая платформа</text>
    </g>
    <g stroke="#4d8bff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M66 320 l3 3 l6 -7"/><path d="M66 348 l3 3 l6 -7"/><path d="M66 376 l3 3 l6 -7"/><path d="M66 404 l3 3 l6 -7"/>
    </g>
    <rect x="66" y="494" width="218" height="42" rx="12" fill="#13233f" stroke="#4d8bff" stroke-opacity="0.4"/>
    <text x="175" y="520" fill="#4d8bff" font-size="13" font-weight="600" text-anchor="middle">Выбрать</text>
  </g>

  <!-- Card HOME (popular) -->
  <g>
    <rect x="325" y="146" width="270" height="424" rx="22" fill="#13233f" stroke="#4d8bff" stroke-width="1.6"/>
    <rect x="402" y="134" width="116" height="24" rx="12" fill="url(#mp)"/>
    <text x="460" y="150" fill="#06121f" font-size="11" font-weight="700" text-anchor="middle">★ ХИТ</text>
    <text x="351" y="190" fill="#eef3fb" font-size="17" font-weight="700">HOME · 3</text>
    <text x="351" y="210" fill="#9aa7bd" font-size="11">самый популярный тариф</text>
    <text x="351" y="258" fill="#eef3fb" font-size="32" font-weight="800">339 <tspan font-size="17" fill="#9aa7bd">₽</tspan></text>
    <text x="351" y="280" fill="#65728a" font-size="11">за 30 дн.</text>
