server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Admin API — более специфичный префикс нужно указать ПЕРВЫМ.
    location /api/admin/ {
        proxy_pass http://remnashop:5000/api/v1/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
    }

    # Проксируем все API-запросы на контейнер remnashop.
    # "remnashop" — имя сервиса из docker-compose.yml бота; контейнеры должны быть
    # в одной docker-сети (см. comments в docker-compose.cabinet.yml).
    location /api/ {
        proxy_pass http://remnashop:5000/api/v1/public/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # cookie-based auth — куки должны проходить как есть
        proxy_pass_request_headers on;
    }

    # Кэшируем статику с хешами в имени файла (Vite добавляет хеш автоматически)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: все остальные пути отдаём на index.html, роутинг берёт на себя React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
