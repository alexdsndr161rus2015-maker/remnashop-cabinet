# ─────────────────────────────────────────────────────────────────────────────
# Запуск САЙТА (кабинета) на ОТДЕЛЬНОМ сервере от бота.
#
# Здесь нет ни бота, ни БД, ни Remnawave — только статика кабинета + nginx,
# который проксирует /api/ на ПУБЛИЧНЫЙ API бота по https (API его уже отдаёт
# через свой reverse-proxy). Приватный канал/WireGuard НЕ нужен.
#
# Предпосылки:
#   1. У бота API доступен снаружи по https на своём домене (напр. bot.example.com)
#      по пути /api/v1/* — это уже так у штатной установки RemnaShop.
#   2. На этом сервере в .env заданы (install.sh site проставит сам):
#        API_UPSTREAM=bot.example.com:443      # домен API бота : 443
#        API_SCHEME=https
#        API_HOST_HEADER=bot.example.com        # Host/SNI для апстрима
#        TELEGRAM_BOT_USERNAME=<имя_бота>       # вшивается в бандл на сборке
#
# Запуск:
#   docker compose -f cabinet/docker-compose.site.yml up -d --build
#
# Перед кабинетом ставится свой reverse-proxy (Caddy/nginx) с TLS на домен
# cabinet.<домен>, проксирующий на 127.0.0.1:5002. Для адреса без порта нужен
# свободный 443 на этом сервере.
# ─────────────────────────────────────────────────────────────────────────────

services:
  cabinet:
    build:
      context: .
      args:
        VITE_TELEGRAM_BOT_USERNAME: "${TELEGRAM_BOT_USERNAME}"
    container_name: remnashop-cabinet
    restart: unless-stopped
    environment:
      # ОБЯЗАТЕЛЬНО: домен API бота : порт (напр. bot.example.com:443).
      # Без значения старт упадёт — защита от случайного дефолта remnashop:5000,
      # которого на отдельном сервере нет.
      API_UPSTREAM: "${API_UPSTREAM:?set API_UPSTREAM, e.g. bot.example.com:443}"
      API_SCHEME: "${API_SCHEME:-https}"
      API_HOST_HEADER: "${API_HOST_HEADER:?set API_HOST_HEADER to bot API domain, e.g. bot.example.com}"
    ports:
      - "127.0.0.1:5002:80"
    volumes:
      # Тот же envsubst-шаблон, что и в одно-серверной установке. Правки конфига
      # без пересборки образа; после правки — up -d --force-recreate cabinet.
      - ./nginx.conf:/etc/nginx/templates/default.conf.template:ro
    # Сеть НЕ указываем — compose создаёт свою (user-defined bridge), в ней доступен
    # встроенный DNS 127.0.0.11, который резолвит и публичный домен API бота.
